# Render Blueprint — deploy with one click from the GitHub repo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: continuous-einsum
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:server
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
